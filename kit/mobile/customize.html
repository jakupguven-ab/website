<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Anpassa färdighet — mobile</title>
<link rel="stylesheet" href="../../assets/fonts/inter.css">
<link rel="stylesheet" href="../../assets/icons/tabler-icons.min.css">
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
<div class="app" style="width:320px;max-width:100%;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:22px;overflow:hidden;display:flex;flex-direction:column;"><div style="padding:11px 14px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between;"><button style="display:flex;align-items:center;gap:4px;font-size:12.5px;border:none;background:transparent;cursor:pointer;color:var(--color-text-secondary);padding:2px 0;"><i class="ti ti-chevron-left" style="font-size:18px;" aria-hidden="true"></i> Vera</button><button aria-label="stäng" style="border:none;background:transparent;cursor:pointer;color:var(--color-text-tertiary);display:flex;"><i class="ti ti-x" style="font-size:19px;" aria-hidden="true"></i></button></div><div style="padding:13px 14px 11px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:9px;"><span style="width:30px;height:30px;border-radius:var(--border-radius-md);background:var(--color-background-info);display:flex;align-items:center;justify-content:center;"><i class="ti ti-calendar-check" style="font-size:16px;color:var(--color-text-info);" aria-hidden="true"></i></span><div style="line-height:1.3;"><p style="margin:0;font-size:13.5px;font-weight:500;">Bokning → faktura</p><p style="margin:0;font-size:11px;color:var(--color-text-secondary);">Inställningar</p></div></div><div style="padding:13px 14px;flex:1;"><p class="reveal" style="margin:0 0 6px;font-size:12px;font-weight:500;">Kalender</p><div class="reveal" style="display:flex;align-items:center;justify-content:space-between;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:8px 11px;font-size:12px;margin-bottom:14px;"><span><i class="ti ti-calendar" style="font-size:14px;vertical-align:-2px;color:var(--color-text-secondary);margin-right:5px;" aria-hidden="true"></i>Kopplad kalender</span><i class="ti ti-chevron-down" style="font-size:15px;color:var(--color-text-tertiary);" aria-hidden="true"></i></div><p class="reveal" style="margin:0 0 8px;font-size:12px;font-weight:500;">Kanaler</p><div class="reveal" style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;"><span style="font-size:11.5px;padding:5px 10px;background:var(--color-background-info);color:var(--color-text-info);border-radius:var(--border-radius-md);"><i class="ti ti-check" style="font-size:13px;vertical-align:-2px;" aria-hidden="true"></i> SMS</span><span style="font-size:11.5px;padding:5px 10px;background:var(--color-background-info);color:var(--color-text-info);border-radius:var(--border-radius-md);"><i class="ti ti-check" style="font-size:13px;vertical-align:-2px;" aria-hidden="true"></i> E-post</span><span style="font-size:11.5px;padding:5px 10px;background:var(--color-background-secondary);color:var(--color-text-tertiary);border-radius:var(--border-radius-md);">Webbformulär</span></div><p class="reveal" style="margin:0 0 6px;font-size:12px;font-weight:500;">Innan Vera agerar</p><label class="reveal" style="display:flex;align-items:center;gap:9px;padding:6px 0;"><span style="width:15px;height:15px;border-radius:50%;border:4px solid var(--color-text-info);box-sizing:border-box;"></span><span style="font-size:12px;">Fråga mig innan kundkontakt</span></label><label class="reveal" style="display:flex;align-items:center;gap:9px;padding:6px 0;"><span style="width:15px;height:15px;border-radius:50%;border:1.5px solid var(--color-border-secondary);box-sizing:border-box;"></span><span style="font-size:12px;color:var(--color-text-secondary);">Kör automatiskt</span></label></div><div style="padding:10px 14px;border-top:0.5px solid var(--color-border-tertiary);display:flex;gap:8px;"><button style="font-size:13px;font-weight:500;padding:9px 18px;border:none;border-radius:var(--border-radius-md);background:var(--color-accent);color:var(--color-on-accent);cursor:pointer;flex:1;">Spara</button><button style="font-size:13px;padding:9px 16px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;cursor:pointer;"><i class='ti ti-player-play' style='font-size:14px;vertical-align:-2px;' aria-hidden='true'></i> Kör nu</button></div></div>
<script src="../assets/reveal.js"></script>
</body>
</html>
