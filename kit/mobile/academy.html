<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Akademin — mobile</title>
<link rel="stylesheet" href="../../assets/fonts/inter.css">
<link rel="stylesheet" href="../../assets/icons/tabler-icons.min.css">
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
<div class="app" style="width:320px;max-width:100%;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:22px;overflow:hidden;display:flex;flex-direction:column;"><div style="padding:16px 16px 12px;"><p style="margin:0;font-size:17px;font-weight:500;">Akademin</p><p style="margin:0;font-size:11.5px;color:var(--color-text-secondary);">lär dina anställda nya färdigheter</p></div><div class="reveal" style="margin:0 14px 12px;display:flex;align-items:center;gap:9px;background:var(--color-background-warning);border-radius:var(--border-radius-md);padding:9px 11px;"><i class="ti ti-progress" style="font-size:17px;color:var(--color-text-warning);" aria-hidden="true"></i><span style="font-size:11.5px;color:var(--color-text-warning);line-height:1.4;"><b style="font-weight:500;">Siv</b> går kursen Leverantörsbeställning</span></div><div style="padding:0 14px;flex:1;"><div class="reveal" style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--color-border-tertiary);"><span style="width:28px;height:28px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center;"><i class="ti ti-calendar-check" style="font-size:15px;color:var(--color-text-info);" aria-hidden="true"></i></span><div style="flex:1;min-width:0;"><p style="margin:0;font-size:12.5px;font-weight:500;">Bokning → faktura</p><p style="margin:0;font-size:10.5px;color:var(--color-text-secondary);">Vera</p></div><span style="font-size:11px;color:var(--color-text-success);"><i class="ti ti-check" style="font-size:14px;vertical-align:-2px;" aria-hidden="true"></i></span></div><div class="reveal" style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--color-border-tertiary);"><span style="width:28px;height:28px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center;"><i class="ti ti-bell-ringing" style="font-size:15px;color:var(--color-text-success);" aria-hidden="true"></i></span><div style="flex:1;min-width:0;"><p style="margin:0;font-size:12.5px;font-weight:500;">Påminnelser & inkasso</p><p style="margin:0;font-size:10.5px;color:var(--color-text-secondary);">Emil · gratis</p></div><button style="font-size:12.5px;padding:5px 11px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;cursor:pointer;">Lär ut</button></div><div class="reveal" style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--color-border-tertiary);"><span style="width:28px;height:28px;border-radius:var(--border-radius-md);background:var(--color-background-warning);display:flex;align-items:center;justify-content:center;"><i class="ti ti-file-dollar" style="font-size:15px;color:var(--color-text-warning);" aria-hidden="true"></i></span><div style="flex:1;min-width:0;"><p style="margin:0;font-size:12.5px;font-weight:500;">ROT/RUT-offerter</p><p style="margin:0;font-size:10.5px;color:var(--color-text-secondary);">Vera</p></div><button style="font-size:12.5px;font-weight:500;padding:5px 11px;border:none;border-radius:var(--border-radius-md);background:var(--color-accent);color:var(--color-on-accent);cursor:pointer;">Lås upp</button></div><div class="reveal" style="display:flex;align-items:center;gap:10px;padding:10px 0;"><span style="width:28px;height:28px;border-radius:var(--border-radius-md);background:var(--color-background-warning);display:flex;align-items:center;justify-content:center;"><i class="ti ti-truck-delivery" style="font-size:15px;color:var(--color-text-warning);" aria-hidden="true"></i></span><div style="flex:1;min-width:0;"><p style="margin:0;font-size:12.5px;font-weight:500;">Leverantörsbeställning</p><p style="margin:0;font-size:10.5px;color:var(--color-text-secondary);">Siv</p></div><span style="font-size:11px;color:var(--color-text-warning);">Pågår</span></div></div><div style="display:flex;border-top:0.5px solid var(--color-border-tertiary);"><div style="flex:1;padding:9px 0 11px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--color-text-tertiary);"><i class="ti ti-users" style="font-size:20px;" aria-hidden="true"></i><span style="font-size:10px;">Team</span></div><div style="flex:1;padding:9px 0 11px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--color-text-tertiary);"><i class="ti ti-checklist" style="font-size:20px;" aria-hidden="true"></i><span style="font-size:10px;">Att göra</span></div><div style="flex:1;padding:9px 0 11px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--color-text-info);"><i class="ti ti-school" style="font-size:20px;" aria-hidden="true"></i><span style="font-size:10px;">Akademin</span></div><div style="flex:1;padding:9px 0 11px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--color-text-tertiary);"><i class="ti ti-dots" style="font-size:20px;" aria-hidden="true"></i><span style="font-size:10px;">Mer</span></div></div></div>
<script src="../assets/reveal.js"></script>
</body>
</html>
